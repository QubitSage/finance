name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'casalapp/casalapp/src/**'
      - 'casalapp/casalapp/public/**'
      - 'casalapp/casalapp/index.html'
      - 'casalapp/casalapp/package.json'
      - 'casalapp/casalapp/capacitor.config.json'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install npm dependencies
        working-directory: casalapp/casalapp
        run: npm install

      - name: Build Vite web app
        working-directory: casalapp/casalapp
        run: npm run build

      - name: Add Capacitor Android platform
        working-directory: casalapp/casalapp
        run: npx cap add android 2>/dev/null || true

      - name: Sync web assets into Android
        working-directory: casalapp/casalapp
        run: npx cap sync android

      - name: Build debug APK
        working-directory: casalapp/casalapp/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -q

      - name: Rename APK
        run: |
          cp casalapp/casalapp/android/app/build/outputs/apk/debug/app-debug.apk casal-app.apk

      - name: Upload artifact (90 dias)
        uses: actions/upload-artifact@v4
        with:
          name: casal-app-apk
          path: casal-app.apk
          retention-days: 90

      - name: Publicar como GitHub Release (link fixo)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: "CasalApp — APK mais recente"
          body: |
            ### Instalar no Android

            1. Baixe o arquivo `casal-app.apk` abaixo
            2. Abra no celular
            3. Se pedir permissão para "instalar de fontes desconhecidas" → Permitir
            4. Instalar e abrir 🎉

            > Gerado automaticamente a cada atualização do app.
          files: casal-app.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
