name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'casalapp/casalapp/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: casalapp/casalapp/package.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: casalapp/casalapp
        run: npm install

      - name: Build web app
        working-directory: casalapp/casalapp
        run: npm run build

      - name: Install Capacitor CLI globally
        run: npm install -g @capacitor/cli@6

      - name: Add Android platform
        working-directory: casalapp/casalapp
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Make gradlew executable
        working-directory: casalapp/casalapp/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: casalapp/casalapp/android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: casal-app-debug
          path: casalapp/casalapp/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
